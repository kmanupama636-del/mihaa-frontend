<div class="auth-wrapper">

  <div class="auth-card">

    <div class="logo">
  <img src="assets/logo.png" style="width: 80px;" ></div>

    <h2>Create your account</h2>

    <form (ngSubmit)="signup()" class="auth-form">

      <input
        type="text"
        placeholder="Full Name"
        [(ngModel)]="name"
        name="name"
        required
      />

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      />

      <button type="submit">Create Account</button>

    </form>

    <p class="auth-link">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>

  </div>

</div>
